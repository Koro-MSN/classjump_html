<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教室ジャンプ</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icon_base.svg" type="image/svg+xml">
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // 初回アクセス時だけ OS のテーマを初期値にする
      if (!localStorage.getItem("theme")) {
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        localStorage.setItem("theme", prefersDark ? "dark" : "light");
      }

      // 保存されたテーマを適用
      const savedTheme = localStorage.getItem("theme");
      const isDark = savedTheme === "dark";

      document.documentElement.classList.toggle("dark", isDark);

      // トグルの位置を確実に反映
      const toggle = document.getElementById("themeToggle");
      if (toggle) {
        toggle.checked = isDark;
      }
    });

    // トグル操作時
    function toggleTheme() {
      const isDark = document.getElementById("themeToggle").checked;
      document.documentElement.classList.toggle("dark", isDark);
      localStorage.setItem("theme", isDark ? "dark" : "light");

      // 初期化（保存されたテーマを適用）
      const savedTheme = localStorage.getItem("theme");
      if (savedTheme === "dark") {
        document.documentElement.classList.add("dark");
        document.getElementById("themeToggle").checked = true;
      }
    }
  </script>
  <style>
    :root {
      --bg: #f5f5f5;
      --fg: #000000;
      --container-bg: #ffffff;
      --button-bg: #0078ff;
      --button-bg-hover: #005fcc;
    }

    :root.dark {
      --bg: #121212;
      --fg: #e0e0e0;
      --container-bg: #1e1e1e;
      --button-bg: #3399ff;
      --button-bg-hover: #1a7ccc;
    }

    body {
      font-family: sans-serif;
      background: var(--bg);
      color: var(--fg);
      padding: 20px;
      margin: 0;
    }

    .container {
      max-width: 420px;
      margin: auto;
      background: var(--container-bg);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 92%;
      padding: 14px;
      font-size: 18px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-bottom: 15px;
      background: var(--container-bg);
      color: var(--fg);
    }

    button {
      width: 100%;
      padding: 14px;
      font-size: 18px;
      border-radius: 8px;
      border: none;
      background: var(--button-bg);
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: var(--button-bg-hover);
    }

    .theme-toggle {
      margin-top: 15px;
      text-align: center;
      cursor: pointer;
      font-size: 16px;
      opacity: 0.8;
    }

    .theme-switch {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 20px;
      font-size: 16px;
      color: var(--fg);
    }

    .switch {
      position: relative;
      width: 50px;
      height: 26px;
      margin-left: 10px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      border-radius: 26px;
      transition: .3s;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 20px;
      width: 20px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      border-radius: 50%;
      transition: .3s;
    }

    input:checked+.slider {
      background-color: #0078ff;
    }

    input:checked+.slider:before {
      transform: translateX(24px);
    }

    body,
    .container,
    input,
    button {
      transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease;
    }

    .slider {
      transition: background-color 0.3s ease;
    }

    .slider:before {
      transition: transform 0.3s ease, background-color 0.3s ease;
    }
  </style>


</head>

<body>

  <div class="container">
    <div class="theme-switch">
      Dark
      <label class="switch">
        <input type="checkbox" id="themeToggle" onchange="toggleTheme()">
        <span class="slider"></span>
      </label>
    </div>
    <h1>教室ジャンプ</h1>

    <input id="room" type="text" placeholder="教室番号を入力 (例: 301)">
    <button onclick="jump()">移動する</button>
  </div>

  <script>
    function jump() {
      const room = document.getElementById("room").value.trim();
      if (!room) return;

      // 例: /class/301.html に飛ばす
      window.location.href = `https://attendance.is.it-chiba.ac.jp/attendance/class_room/${room}`;
    }
  </script>

</body>

</html>
